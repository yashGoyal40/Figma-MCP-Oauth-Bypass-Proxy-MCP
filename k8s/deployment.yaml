apiVersion: apps/v1
kind: Deployment
metadata:
  name: figma-mcp
  labels:
    app: figma-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: figma-mcp
  template:
    metadata:
      labels:
        app: figma-mcp
    spec:
      containers:
        - name: figma-mcp
          # Set after building: docker build -t figma-mcp-server:latest .
          # e.g. ghcr.io/myorg/figma-mcp-server:latest
          image: <IMAGE_NAME>
          ports:
            - containerPort: 3100
              name: http
          env:
            - name: PORT
              value: "3100"
            - name: NODE_ENV
              value: "production"
            - name: MCP_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: figma-mcp-secrets
                  key: MCP_AUTH_TOKEN
            - name: FIGMA_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: figma-mcp-secrets
                  key: FIGMA_OAUTH_CLIENT_ID
            - name: FIGMA_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: figma-mcp-secrets
                  key: FIGMA_OAUTH_CLIENT_SECRET
            - name: FIGMA_OAUTH_REFRESH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: figma-mcp-secrets
                  key: FIGMA_OAUTH_REFRESH_TOKEN
            # Optional: OpenTelemetry for traces/metrics. Omit to run without observability.
            # - name: OTEL_SERVICE_NAME
            #   value: "figma-mcp-server"
            # - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
            #   value: "http://<otel-collector>:4318/v1/traces"
            # - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
            #   value: "http://<otel-collector>:4318/v1/metrics"
            # - name: OTEL_METRICS_EXPORTER
            #   value: "otlp"
            # - name: OTEL_EXPORTER_OTLP_COMPRESSION
            #   value: "gzip"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      restartPolicy: Always
